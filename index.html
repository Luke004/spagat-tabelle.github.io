<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelle mit Einheiten</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #f0f2f5;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .plus-btn {
            background: #28a745;
            color: white;
        }

        .minus-btn {
            background: #dc3545;
            color: white;
        }

        .add-name-btn {
            display: block;
            margin: 0 auto;
            background: #007bff;
            color: white;
            padding: 10px 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        .empty-message {
            text-align: center;
            color: #777;
            padding: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Einheiten-Tabelle</h1>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Einheiten</th>
            <th>Aktionen</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="add-name-btn" id="addNameBtn">+ Namen hinzufügen</button>
</div>

<script>
    const personen = [
        { name: "Clara", units: 13 },
        { name: "Melli", units: 12 },
        { name: "Franzi", units: 10 },
        { name: "Denise", units: 11 },
        { name: "Sina", units: 11 },
        { name: "Lukas", units: 9 },
        { name: "Mara", units: 11 },
        { name: "Eileen", units: 7 },
        { name: "Lea", units: 6 },
        { name: "Amina", units: 6 },
        { name: "Jason", units: 5 },
        { name: "Maurice", units: 3 },
        { name: "Klara", units: 2 },
        { name: "Emma", units: 2 },
        { name: "Paula", units: 1 }
    ];

    const tableBody = document.getElementById("tableBody");
    const addNameBtn = document.getElementById("addNameBtn");

    function sortierePersonen() {
        personen.sort((a, b) => b.units - a.units || a.name.localeCompare(b.name));
    }

    function renderTable() {
        sortierePersonen();
        tableBody.innerHTML = "";

        if (personen.length === 0) {
            tableBody.innerHTML = `
          <tr>
            <td colspan="3" class="empty-message">Noch keine Namen vorhanden.</td>
          </tr>
        `;
            return;
        }

        personen.forEach((person, index) => {
            const row = document.createElement("tr");

            row.innerHTML = `
          <td>${person.name}</td>
          <td>${person.units}</td>
          <td>
            <div class="actions">
              <button class="plus-btn" onclick="changeUnits(${index}, 1)">+</button>
              <button class="minus-btn" onclick="changeUnits(${index}, -1)">-</button>
            </div>
          </td>
        `;

            tableBody.appendChild(row);
        });
    }

    function changeUnits(index, amount) {
        personen[index].units += amount;

        if (personen[index].units < 0) {
            personen[index].units = 0;
        }

        renderTable();
    }

    addNameBtn.addEventListener("click", () => {
        const neuerName = prompt("Bitte Namen eingeben:");

        if (!neuerName) return;

        const bereinigterName = neuerName.trim();
        if (bereinigterName === "") return;

        personen.push({
            name: bereinigterName,
            units: 0
        });

        renderTable();
    });

    renderTable();
</script>
</body>
</html>
